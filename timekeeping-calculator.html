<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timekeeping Calculator — Tanni's Desk Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#6b4ab0; --purple2:#8b6fcc; --purple3:#a98fdc;
  --purple4:#c4adec; --purple-pale:#f3f0ff; --purple-mid:#ddd4f8; --purple-deep:#3a2070;
  --canvas:#f5f3ff; --card-bg:#ffffff; --card-border:#e8e3f8;
  --card-hover-border:#a98fdc; --ink:#160e2c; --ink-mid:#3d2f6b; --ink-soft:#7a6fa0;
  --border:#ddd4f8;
  --green:#166534; --green-bg:#f0fdf4; --green-border:#86efac;
  --red:#9b1c1c; --red-bg:#fef2f2; --red-border:#fca5a5;
  --amber:#8a5200; --amber-bg:#fff8ec; --amber-border:#e8c060;
  --blue:#1d6fa4;
  --white:#ffffff;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --radius:10px;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);font-size:15px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:200;background:var(--purple);border-bottom:1px solid rgba(255,255,255,.12);padding:12px 20px;display:flex;align-items:center;gap:14px;}
.hbadge{background:rgba(255,255,255,.2);color:white;font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:0.1em;white-space:nowrap;}
.htitle{font-size:15px;font-weight:700;color:white;}
.hsub{font-size:11px;color:rgba(255,255,255,.65);font-family:var(--mono);}

/* ── MAIN ── */
main{max-width:560px;margin:0 auto;padding:28px 20px 60px;}

/* ── CARDS ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;}
.card-label{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--purple);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;}

/* ── FIELDS ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
label{font-size:12px;font-weight:600;color:var(--ink-mid);letter-spacing:.04em;text-transform:uppercase;}
label small{font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-soft);}

input[type="time"],
input[type="number"]{
  width:100%;
  padding:9px 12px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--canvas);
  color:var(--ink);
  font-size:15px;
  font-family:var(--mono);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
  -moz-appearance:textfield;
}
input[type="time"]:focus,
input[type="number"]:focus{
  border-color:var(--purple3);
  box-shadow:0 0 0 3px rgba(107,74,176,.12);
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{opacity:.5;}

.field-error{font-size:12px;color:var(--red);display:none;}
.has-error .field-error{display:block;}
.has-error input{border-color:var(--red);}

/* ── PRESET BUTTONS ── */
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.preset-btn{background:var(--canvas);border:1.5px solid var(--border);color:var(--ink-soft);font-family:var(--mono);font-size:11px;font-weight:500;padding:4px 12px;border-radius:5px;cursor:pointer;transition:all .15s;}
.preset-btn:hover{border-color:var(--purple2);color:var(--purple);background:var(--purple-pale);}
.preset-btn.active{background:var(--purple-pale);border-color:var(--purple);color:var(--purple);font-weight:700;}

/* ── RESULT ── */
.result-card{background:var(--purple-pale);border:2px solid var(--purple);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;}
.result-label{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--purple);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.result-time{font-family:var(--mono);font-size:40px;font-weight:500;color:var(--purple-deep);letter-spacing:-.02em;line-height:1.1;}
.result-time .overnight-badge{
  display:inline-block;font-size:10px;font-weight:700;
  background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);
  border-radius:4px;padding:2px 7px;margin-left:10px;
  vertical-align:middle;font-family:var(--mono);letter-spacing:.04em;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.result-card.animate{animation:fadeUp .22s ease;}

/* ── BREAKDOWN ── */
.breakdown{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
.bd-row{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-radius:7px;background:rgba(107,74,176,.05);border:1px solid rgba(107,74,176,.08);}
.bd-left{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-mid);}
.bd-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-work{background:var(--purple);}
.dot-lunch{background:var(--amber);}
.dot-total{background:var(--blue);}
.bd-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);}

/* ── BUTTONS ── */
.btn{background:var(--purple);color:white;border:none;font-family:var(--font);font-size:14px;font-weight:700;padding:11px 22px;border-radius:var(--radius);cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:7px;}
.btn:hover{background:var(--purple2);}
.btn.ghost{background:transparent;border:1.5px solid var(--border);color:var(--ink-soft);font-size:13px;padding:9px 18px;}
.btn.ghost:hover{border-color:var(--purple);color:var(--purple);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
</style>
</head>
<body>

<header>
  <span class="hbadge">UTIL</span>
  <span class="htitle">Timekeeping Calculator</span>
  <span class="hsub">Clock-in → Clock-out</span>
</header>

<main>

  <!-- Result card (top — updates live) -->
  <div class="result-card" id="resultCard" aria-live="polite" aria-atomic="true">
    <div class="result-label">Clock-out time</div>
    <div class="result-time" id="result">—</div>
    <div class="breakdown" id="breakdown">
      <div class="bd-row">
        <span class="bd-left"><span class="bd-dot dot-work"></span>Work duration</span>
        <span class="bd-val" id="bd-work">—</span>
      </div>
      <div class="bd-row">
        <span class="bd-left"><span class="bd-dot dot-lunch"></span>Lunch / break</span>
        <span class="bd-val" id="bd-lunch">—</span>
      </div>
      <div class="bd-row">
        <span class="bd-left"><span class="bd-dot dot-total"></span>Total time away</span>
        <span class="bd-val" id="bd-total">—</span>
      </div>
    </div>
  </div>

  <!-- Inputs card -->
  <div class="card">
    <div class="card-label">Inputs</div>

    <div class="field" id="field-clockin">
      <label for="clockin">Clock-in time</label>
      <input type="time" id="clockin" aria-label="Clock-in time">
    </div>

    <div class="field" id="field-hours">
      <label for="hours">Work hours</label>
      <input type="number" id="hours" value="8" min="0" max="24" step="0.25" aria-label="Work hours">
      <span class="field-error" id="hours-err">Enter a value between 0 and 24.</span>
      <div class="preset-row" id="hours-presets">
        <button class="preset-btn" onclick="setHours(7.5)">7.5h</button>
        <button class="preset-btn active" onclick="setHours(8)">8h</button>
        <button class="preset-btn" onclick="setHours(8.5)">8.5h</button>
        <button class="preset-btn" onclick="setHours(10)">10h</button>
        <button class="preset-btn" onclick="setHours(12)">12h</button>
      </div>
    </div>

    <div class="field" id="field-lunch">
      <label for="lunch">Break <small>(minutes)</small></label>
      <input type="number" id="lunch" value="30" min="0" max="480" step="5" aria-label="Break in minutes">
      <span class="field-error" id="lunch-err">Enter a value between 0 and 480.</span>
      <div class="preset-row" id="lunch-presets">
        <button class="preset-btn" onclick="setLunch(0)">None</button>
        <button class="preset-btn" onclick="setLunch(15)">15m</button>
        <button class="preset-btn active" onclick="setLunch(30)">30m</button>
        <button class="preset-btn" onclick="setLunch(45)">45m</button>
        <button class="preset-btn" onclick="setLunch(60)">60m</button>
      </div>
    </div>

    <div class="btn-row" style="margin-top:16px;">
      <button class="btn ghost" onclick="resetDefaults()">
        <i class="ph ph-arrow-counter-clockwise"></i> Reset
      </button>
    </div>
  </div>

</main>

<script>
const elClockin  = document.getElementById('clockin');
const elHours    = document.getElementById('hours');
const elLunch    = document.getElementById('lunch');
const elResult   = document.getElementById('result');
const elBdWork   = document.getElementById('bd-work');
const elBdLunch  = document.getElementById('bd-lunch');
const elBdTotal  = document.getElementById('bd-total');
const elCard     = document.getElementById('resultCard');
const fHours     = document.getElementById('field-hours');
const fLunch     = document.getElementById('field-lunch');

const DEFAULTS = { hours: 8, lunch: 30 };

function nowRounded() {
  const d = new Date();
  let hh = d.getHours(), mm = Math.round(d.getMinutes() / 5) * 5;
  if (mm >= 60) { hh += 1; mm -= 60; }
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function formatTime(totalMins) {
  const mins = ((totalMins % 1440) + 1440) % 1440;
  const h = Math.floor(mins / 60), m = mins % 60;
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function fmtDuration(totalMins) {
  if (isNaN(totalMins) || totalMins < 0) return '—';
  const h = Math.floor(totalMins / 60), m = totalMins % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function parseClockIn(val) {
  if (!val) return null;
  const [hh, mm] = val.split(':').map(Number);
  return hh * 60 + mm;
}

function validate() {
  let ok = true;
  const h = parseFloat(elHours.value);
  if (isNaN(h) || h < 0 || h > 24) { fHours.classList.add('has-error'); ok = false; }
  else fHours.classList.remove('has-error');
  const l = parseInt(elLunch.value, 10);
  if (isNaN(l) || l < 0 || l > 480) { fLunch.classList.add('has-error'); ok = false; }
  else fLunch.classList.remove('has-error');
  return ok;
}

function syncPresets() {
  const h = parseFloat(elHours.value);
  document.querySelectorAll('#hours-presets .preset-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === h ||
      (b.textContent === '7.5h' && h === 7.5));
  });
  const l = parseInt(elLunch.value, 10);
  document.querySelectorAll('#lunch-presets .preset-btn').forEach(b => {
    const v = b.textContent === 'None' ? 0 : parseInt(b.textContent);
    b.classList.toggle('active', v === l);
  });
}

function calculate() {
  syncPresets();
  if (!validate()) {
    elResult.textContent = '—';
    elBdWork.textContent = elBdLunch.textContent = elBdTotal.textContent = '—';
    return;
  }
  const clockInMins = parseClockIn(elClockin.value);
  if (clockInMins === null) { elResult.textContent = '—'; return; }

  const workMins  = Math.round(parseFloat(elHours.value) * 60);
  const lunchMins = parseInt(elLunch.value, 10);
  const totalMins = workMins + lunchMins;
  const clockOut  = clockInMins + totalMins;
  const overnight = clockOut >= 1440;

  // Animate
  elCard.classList.remove('animate');
  void elCard.offsetWidth;
  elCard.classList.add('animate');

  // Set result
  elResult.textContent = formatTime(clockOut);
  if (overnight) {
    const badge = document.createElement('span');
    badge.className = 'overnight-badge';
    badge.textContent = 'next day';
    elResult.appendChild(badge);
  }

  elBdWork.textContent  = fmtDuration(workMins);
  elBdLunch.textContent = lunchMins === 0 ? 'none' : fmtDuration(lunchMins);
  elBdTotal.textContent = fmtDuration(totalMins);
}

function setHours(val) {
  elHours.value = val;
  calculate();
}

function setLunch(val) {
  elLunch.value = val;
  calculate();
}

function resetDefaults() {
  elClockin.value = nowRounded();
  elHours.value   = DEFAULTS.hours;
  elLunch.value   = DEFAULTS.lunch;
  fHours.classList.remove('has-error');
  fLunch.classList.remove('has-error');
  calculate();
}

elClockin.addEventListener('input', calculate);
elHours.addEventListener('input',   calculate);
elLunch.addEventListener('input',   calculate);
[elHours, elLunch].forEach(el => el.addEventListener('keydown', e => { if(e.key==='-') e.preventDefault(); }));

// Init
elClockin.value = nowRounded();
calculate();
</script>
</body>
</html>
